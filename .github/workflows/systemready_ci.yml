name: SystemReady-ACS CI (reusable)

on:
  workflow_call:
    inputs:
      run-sysready:
        description: "Run SystemReady band build"
        type: boolean
        required: false
        default: true
      run-dt:
        description: "Run Devicetree band build"
        type: boolean
        required: false
        default: true
    secrets:
      dummy:
        required: false

defaults:
  run:
    shell: bash

# Yocto caches (big speedups)
env:
  DL_DIR: ${{ github.workspace }}/.yocto-cache/downloads
  SSTATE_DIR: ${{ github.workspace }}/.yocto-cache/sstate

jobs:
  #######################################################################
  # SystemReady band build (as-is)
  #######################################################################
  systemready:
    if: ${{ inputs.run-sysready }}
    name: SystemReady band • build
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install gnu-efi dependencies
        run: |
          sudo apt update
          sudo apt install -y gnu-efi

      - name: Start building
        run: |
          sudo -s;
          git config --global user.name "arm-systemready";
          git config --global user.email "arm-systemready@arm.com";
          cd SystemReady-band/;
          ./build-scripts/get_source.sh;
          ./build-scripts/build-systemready-band-live-image.sh

      - name: Upload SystemReady image
        uses: actions/upload-artifact@v4
        with:
          name: systemready_acs_live_image.img.xz
          path: SystemReady-band/output/systemready_acs_live_image.img.xz
          if-no-files-found: error

  #######################################################################
  # Devicetree band build (root, with Yocto caches & speed-ups)
  #######################################################################
  devicetree:
    if: ${{ inputs.run-dt }}
    name: Devicetree band • build
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/chetan-rathore/yocto-host:22.04   # your pre-baked image
      options: --user 0:0                               # run steps as root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Reuse downloads and sstate between runs
      - name: Cache Yocto downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.DL_DIR }}
          key: yocto-dl-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/conf/*.conf') }}
          restore-keys: |
            yocto-dl-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Yocto sstate
        uses: actions/cache@v4
        with:
          path: ${{ env.SSTATE_DIR }}
          key: yocto-sstate-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/conf/*.conf') }}
          restore-keys: |
            yocto-sstate-${{ runner.os }}-${{ runner.arch }}-

      - name: Start building (root) with caches
        run: |
          set -eux
          cd SystemReady-devicetree-band/Yocto

          # Fetch layers/sources (your script)
          ./build-scripts/get_source.sh

          # Allow BitBake as root (Yocto sanity hack)
          sed -i 's/if 0 == os.getuid/if 1 == os.getuid/' meta-woden/poky/meta/classes-global/sanity.bbclass

          # Locate or create the build/conf/local.conf we should tweak
          LOCALCONF="$(find . -path '*/build/conf/local.conf' | head -n1 || true)"
          if [ -z "${LOCALCONF}" ]; then
            # fallback to the standard location used in your tree
            mkdir -p meta-woden/build/conf
            LOCALCONF="meta-woden/build/conf/local.conf"
            touch "${LOCALCONF}"
          fi

          # Inject caches + parallelism (idempotent-ish)
          {
            echo ''
            echo '# === CI speed-ups (injected) ==='
            echo 'DL_DIR ?= "${@os.environ.get("DL_DIR")}"'
            echo 'SSTATE_DIR ?= "${@os.environ.get("SSTATE_DIR")}"'
            echo 'BB_NUMBER_THREADS ?= "${@oe.utils.cpu_count()}"'
            echo 'PARALLEL_MAKE ?= "-j ${@oe.utils.cpu_count()}"'
          } >> "${LOCALCONF}"

          # Build (your script)
          ./build-scripts/build-systemready-dt-band-live-image.sh

      - name: Upload Devicetree image
        uses: actions/upload-artifact@v4
        with:
          name: systemready-dt_acs_live_image.wic.xz
          path: SystemReady-devicetree-band/Yocto/meta-woden/build/tmp/deploy/images/generic-arm64/systemready-dt_acs_live_image.wic.xz
          if-no-files-found: error
